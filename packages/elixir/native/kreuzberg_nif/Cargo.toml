[package]
name = "kreuzberg_nif"
version = "4.10.0-rc.15"
edition = "2024"
license = "Elastic-2.0"

[lib]
crate-type = ["cdylib"]

[dependencies]
kreuzberg = { path = "../../../../crates/kreuzberg", features = ["full"] }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

# Archive crates crash with SIGBUS under opt-level=3 on macOS ARM64.
# Mirror the workspace Cargo.toml override so standalone (non-workspace) NIF builds
# also get the correct opt-level.
[profile.release.package.sevenz-rust2]
opt-level = 2

[profile.release.package.zip]
opt-level = 2
