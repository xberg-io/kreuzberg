[package]
name = "xberg-r"
version = "1.0.0-rc.1"
edition = "2024"
license = "MIT"
description = "High-performance document intelligence library"
readme = false
keywords = ["document", "extraction", "ocr", "pdf", "text"]
categories = []

[lib]
crate-type = ["staticlib", "lib"]

[dependencies]
async-trait = "0.1"
extendr-api = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
# Aligned with the WASM binding's curated, pure-Rust feature set so the R package
# builds on r-universe runners (no ONNX/ORT, Paddle, candle, or transcription
# system deps). See packages/r/R-UNIVERSE.md. NOTE: the generated binding
# (src/lib.rs) must be regenerated with wasm-target's type exclusions before this
# compiles — it currently references ORT-only types (Embedding*/Layout*/Ner*/Reranker*).
xberg = { version = "1.0.0-rc.1", path = "../../../../crates/xberg", default-features = false, features = ["wasm-target"] }

[features]
default = ["api", "api-types", "auto-rotate-types", "chunking-tokenizers", "diff", "heic", "heuristics", "html", "keywords-rake", "keywords-yake", "layout-types", "liter-llm", "markdown-footnotes", "ocr", "ocr-wasm", "office", "paddle-ocr-types", "pdf", "presets", "quality", "redaction", "reranker", "reranker-presets", "svg", "transcription-types", "tree-sitter", "url-ingestion", "xml"]
api = ["xberg/api"]
api-types = ["xberg/api-types"]
auto-rotate-types = ["xberg/auto-rotate-types"]
chunking-tokenizers = ["xberg/chunking-tokenizers"]
diff = ["xberg/diff"]
heic = ["xberg/heic"]
heuristics = ["xberg/heuristics"]
html = ["xberg/html"]
keywords-rake = ["xberg/keywords-rake"]
keywords-yake = ["xberg/keywords-yake"]
layout-types = ["xberg/layout-types"]
liter-llm = ["xberg/liter-llm"]
markdown-footnotes = ["xberg/markdown-footnotes"]
ocr = ["xberg/ocr"]
ocr-wasm = ["xberg/ocr-wasm"]
office = ["xberg/office"]
paddle-ocr-types = ["xberg/paddle-ocr-types"]
pdf = ["xberg/pdf"]
presets = ["xberg/presets"]
quality = ["xberg/quality"]
redaction = ["xberg/redaction"]
reranker = ["xberg/reranker"]
reranker-presets = ["xberg/reranker-presets"]
svg = ["xberg/svg"]
transcription-types = ["xberg/transcription-types"]
tree-sitter = ["xberg/tree-sitter"]
url-ingestion = ["xberg/url-ingestion"]
xml = ["xberg/xml"]
