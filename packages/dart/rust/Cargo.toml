[package]
name = "kreuzberg-dart"
version = "0.7.11"
edition = "2024"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
kreuzberg = { path = "../../../crates/kreuzberg", features = ["full"] }
flutter_rust_bridge = "2.12.0"
serde_json = "1"
tokio = { version = "1", features = ["rt"] }
anyhow = "1"
async-trait = "0.1"
