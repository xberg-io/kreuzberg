name: Cache HuggingFace fastembed models
description: >-
  Persists the HuggingFace hub cache directory used by the xberg embedding
  and reranker engines, keyed on a hash of the preset definitions so any
  catalog change forces a fresh download. Sets XBERG_HF_CACHE_DIR so
  downstream tests pick up the cache automatically.

inputs:
  cache-key-suffix:
    description: >-
      Optional segment appended to the cache key. Use this to partition caches
      per test suite or per session of the catalog overhaul roadmap.
    required: false
    default: ""

  cache-dir:
    description: >-
      Override the cache directory. Defaults to ~/.cache/huggingface/hub which
      is what hf-hub uses out of the box.
    required: false
    default: ""

outputs:
  cache-hit:
    description: "Whether the cache was restored from a previous run."
    value: ${{ steps.restore.outputs.cache-hit }}
  cache-dir:
    description: "Absolute path of the cache directory now in use."
    value: ${{ steps.resolve.outputs.cache-dir }}

runs:
  using: composite
  steps:
    - name: Resolve cache directory
      id: resolve
      shell: bash
      run: |
        if [[ -n "${{ inputs.cache-dir }}" ]]; then
          dir="${{ inputs.cache-dir }}"
        else
          dir="$HOME/.cache/huggingface/hub"
        fi
        mkdir -p "$dir"
        echo "cache-dir=$dir" >> "$GITHUB_OUTPUT"
        echo "XBERG_HF_CACHE_DIR=$dir" >> "$GITHUB_ENV"

    - name: Restore HuggingFace fastembed cache
      id: restore
      uses: actions/cache@v4
      with:
        path: ${{ steps.resolve.outputs.cache-dir }}
        key: hf-fastembed-${{ runner.os }}-${{ hashFiles('crates/xberg/src/reranking/mod.rs', 'crates/xberg/src/embeddings/mod.rs') }}-${{ inputs.cache-key-suffix }}
        restore-keys: |
          hf-fastembed-${{ runner.os }}-${{ hashFiles('crates/xberg/src/reranking/mod.rs', 'crates/xberg/src/embeddings/mod.rs') }}-
          hf-fastembed-${{ runner.os }}-
