name: Cache and Prefetch Hugging Face models for fastembed
description: Cache Hugging Face model directories and optionally prefetch common fastembed models
inputs:
  cache-key-suffix:
    description: Cache key suffix to differentiate model sets
    required: false
    default: fastembed-v1
  fastembed-version:
    description: fastembed crate version to use for prefetch
    required: false
    default: "5.3"
  models:
    description: Comma-separated list of fastembed models to prefetch (use 'default' for the default model)
    required: false
    default: "default,AllMiniLML6V2Q,BGEBaseENV15"
  prefetch:
    description: Whether to pre-download models
    required: false
    default: "true"
  kreuzberg-cache-dir:
    description: >
      Root cache directory for kreuzberg (KREUZBERG_CACHE_DIR). Models are stored under
      <kreuzberg-cache-dir>/embeddings. Must match KREUZBERG_CACHE_DIR used in test steps.
    required: false
    default: "${{ github.workspace }}/.kreuzberg-cache"
runs:
  using: composite
  steps:
    - name: Cache Hugging Face models (kreuzberg embeddings path)
      uses: actions/cache@v5
      with:
        path: ${{ inputs.kreuzberg-cache-dir }}/embeddings
        key: hf-models-v3-${{ runner.os }}-${{ runner.arch }}-${{ inputs.cache-key-suffix }}
        restore-keys: |
          hf-models-v3-${{ runner.os }}-${{ runner.arch }}-
          hf-models-v3-${{ runner.os }}-

    - name: Prefetch fastembed models
      if: inputs.prefetch == 'true'
      shell: bash
      env:
        FASTEMBED_VERSION: ${{ inputs.fastembed-version }}
        MODELS: ${{ inputs.models }}
        # HF_HUB_CACHE tells hf-hub (used by fastembed internally) where to store models.
        # Setting it to KREUZBERG_CACHE_DIR/embeddings ensures the prefetch populates exactly
        # the directory that kreuzberg's embedding engine reads from at runtime.
        HF_HUB_CACHE: ${{ inputs.kreuzberg-cache-dir }}/embeddings
      run: kreuzberg/scripts/ci/actions/cache-hf-fastembed/prefetch.sh
