name: Kotlin Android

on:
  workflow_dispatch:
  # Kotlin Android binding is generated by alef. Keep this manual until the
  # mobile CI workflow is the canonical push/PR gate.

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/kotlin-android
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run Gradle build
        run: gradle build
      - name: Run Gradle tests
        run: gradle test
