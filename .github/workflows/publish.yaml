  cli-musl-binaries:
    name: Build CLI musl binary (${{ matrix.arch }})
    needs: [prepare, validate-versions, check-cli]
    if: |
      needs.prepare.outputs.release_cli == 'true' &&
      needs.check-cli.outputs.exists != 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Ensure target commit
        if: ${{ needs.prepare.outputs.target_sha != '' }}
        run: git checkout --progress --force ${{ needs.prepare.outputs.target_sha }}

      - name: Free up disk space
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Build CLI binary via Docker
        run: |
          docker build -f docker/Dockerfile.musl-build \
            --output type=local,dest=./dist .

      - name: Verify CLI binary
        run: |
          file dist/kreuzberg
          echo "=== Dynamic dependencies ==="
          readelf -d dist/kreuzberg 2>/dev/null | grep -E "NEEDED|RPATH|RUNPATH" || echo "No dependencies"
          echo "=== Bundled libraries ==="
          ls -la dist/lib/ 2>/dev/null || echo "No bundled libraries"
          # Binary is dynamically linked against musl libc for dlopen support
          # RPATH is set to $ORIGIN/lib so runtime libraries are found relative to the binary.
          echo "Binary built successfully"

      - name: Package CLI artifact
        run: |
          TARGET="${{ matrix.target }}"
          STAGE="kreuzberg-cli-${TARGET}"
          mkdir -p "$STAGE/lib"
          cp dist/kreuzberg "$STAGE/"
          cp dist/kreuzberg.bin "$STAGE/" 2>/dev/null || true
          cp dist/lib/* "$STAGE/lib/" 2>/dev/null || true
          cp LICENSE "$STAGE/"
          cp README.md "$STAGE/"
          tar -czf "kreuzberg-cli-${TARGET}.tar.gz" "$STAGE"
          rm -rf "$STAGE"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: kreuzberg-cli-${{ matrix.target }}.tar.gz
          retention-days: 14

  homebrew-bottles:
    name: Build Homebrew bottles (${{ matrix.bottle_tag }})
    needs: [prepare, check-homebrew]
    if: |
      needs.prepare.outputs.release_homebrew == 'true' &&
      needs.check-homebrew.outputs.exists != 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            bottle_tag: arm64_sequoia
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Ensure target commit
        if: ${{ needs.prepare.outputs.target_sha != '' }}
        run: git checkout --progress --force ${{ needs.prepare.outputs.target_sha }}

      - name: Setup Rust toolchain
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: publish-homebrew-${{ matrix.bottle_tag }}

      - name: Setup Homebrew
        run: |
          brew tap homebrew/core
          brew update

      - name: Extract version
        id: version
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build CLI for bottle
        run: |
          cargo build --release \
            -p kreuzberg-cli \
            --features api,mcp,mcp-http

      - name: Create Homebrew bottle
        id: bottle
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          # Prepare bottle directory structure (Homebrew expects kreuzberg/VERSION/...)
          bottle_root="/tmp/kreuzberg-bottle"
          bottle_dir="${bottle_root}/kreuzberg/${VERSION}"
          mkdir -p "${bottle_dir}/bin"

          # Copy the built binary
          cp target/release/kreuzberg "${bottle_dir}/bin/"

          # Create bottle tarball from the root containing kreuzberg/VERSION/...
          cd "${bottle_root}"
          bottle_filename="kreuzberg-${VERSION}.${{ matrix.bottle_tag }}.bottle.tar.gz"
          tar -czf "${bottle_filename}" kreuzberg/

          # Calculate SHA256
          sha256=$(shasum -a 256 "${bottle_filename}" | cut -d' ' -f1)
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          echo "filename=${bottle_filename}" >> "$GITHUB_OUTPUT"

          # Copy to workspace for artifact upload
          cp "${bottle_filename}" "${{ github.workspace }}/"
          echo "Bottle created: ${bottle_filename}"
          echo "SHA256: ${sha256}"

      - name: Upload bottle artifact
        uses: actions/upload-artifact@v7
        with:
          name: homebrew-bottle-${{ matrix.bottle_tag }}
          path: kreuzberg-${{ steps.version.outputs.version }}.${{ matrix.bottle_tag }}.bottle.tar.gz
          retention-days: 14

  upload-homebrew-bottles:
    name: Upload Homebrew bottles to GitHub Release
    needs: [prepare, check-homebrew, homebrew-bottles]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.is_tag == 'true' &&
      needs.prepare.outputs.release_homebrew == 'true' &&
      needs.check-homebrew.outputs.exists != 'true' &&
      needs.homebrew-bottles.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/publish/ensure-github-release-exists.sh "${{ needs.prepare.outputs.tag }}"

      - name: Download bottle artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: homebrew-bottle-*
          path: dist/homebrew
          merge-multiple: true

      - name: Upload bottles (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: scripts/publish/upload-homebrew-bottles.sh "${{ needs.prepare.outputs.tag }}" dist/homebrew

