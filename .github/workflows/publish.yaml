name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v4.3.6)"
        required: true
        type: string
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
      ref:
        description: "Git ref (branch, tag, or commit) to build; defaults to the tag"
        required: false
        type: string
      targets:
        description: "Comma-separated list of release targets (all, python, node, ruby, cli, crates, docker, homebrew, java, csharp, r, elixir, c-ffi)"
        required: false
        type: string
      force_republish:
        description: "Force re-publish even if artifacts already exist"
        required: false
        type: boolean
        default: false
      republish:
        description: "Delete and re-create the tag on current HEAD before publishing (retag + full republish)"
        required: false
        type: boolean
        default: false
  release:
    types: [published]
  repository_dispatch:
    types: [publish-release]

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || github.event.inputs.tag)) || github.ref || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ORT_VERSION: "1.24.2"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      ref: ${{ steps.meta.outputs.ref }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      matrix_ref: ${{ steps.meta.outputs.matrix_ref }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      release_targets: ${{ steps.meta.outputs.release_targets }}
      release_any: ${{ steps.meta.outputs.release_any }}
      release_python: ${{ steps.meta.outputs.release_python }}
      release_node: ${{ steps.meta.outputs.release_node }}
      release_ruby: ${{ steps.meta.outputs.release_ruby }}
      release_cli: ${{ steps.meta.outputs.release_cli }}
      release_crates: ${{ steps.meta.outputs.release_crates }}
      release_rust: ${{ steps.meta.outputs.release_crates }}
      release_homebrew: ${{ steps.meta.outputs.release_homebrew }}
      release_java: ${{ steps.meta.outputs.release_java }}
      release_csharp: ${{ steps.meta.outputs.release_csharp }}
      release_go: ${{ steps.meta.outputs.release_go }}
      release_wasm: ${{ steps.meta.outputs.release_wasm }}
      release_php: ${{ steps.meta.outputs.release_php }}
      release_elixir: ${{ steps.meta.outputs.release_elixir }}
      release_c_ffi: ${{ steps.meta.outputs.release_c_ffi }}
    steps:
      - name: Checkout code (default)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Retag for republish
        if: ${{ inputs.republish == true || github.event.client_payload.republish == true }}
        env:
          TAG: ${{ inputs.tag || github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "${TAG}" ]]; then
            echo "::error::republish requires a tag input"
            exit 1
          fi
          sha="$(git rev-parse HEAD)"
          echo "::notice::Republish requested — deleting and re-creating tag ${TAG} on ${sha:0:8}"
          # Delete via API (avoids workflows permission issue with git push)
          gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG}" -X DELETE 2>/dev/null || true
          # Create via API
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${sha}" --silent
          # Update local state
          git tag -d "${TAG}" 2>/dev/null || true
          git tag "${TAG}" "${sha}"

      - name: Validate tag and compute version
        id: meta
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_TARGETS: ${{ inputs.targets }}
          INPUT_FORCE_REPUBLISH: ${{ inputs.force_republish }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          EVENT_DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          EVENT_DISPATCH_DRY_RUN: ${{ github.event.client_payload.dry_run }}
          EVENT_DISPATCH_REF: ${{ github.event.client_payload.ref }}
          EVENT_DISPATCH_TARGETS: ${{ github.event.client_payload.targets }}
        run: scripts/publish/prepare-release-metadata.sh

      - name: Stash release metadata before re-checkout
        run: cp release-metadata.json /tmp/release-metadata.json

      - name: Re-checkout at target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Restore release metadata after re-checkout
        run: cp /tmp/release-metadata.json release-metadata.json

      - name: Upload release metadata
        uses: actions/upload-artifact@v7
        with:
          name: release-metadata
          path: release-metadata.json
          retention-days: 14

  validate-versions:
    name: Validate version consistency
    needs: [prepare]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check version consistency
        shell: bash
        env:
          EXPECTED_VERSION: ${{ needs.prepare.outputs.version }}
        run: scripts/publish/validate-version-consistency.sh

  check-pypi:
    name: Check if Python package exists on PyPI
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_python == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check PyPI for existing version
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: pypi
          package: kreuzberg
          version: ${{ needs.prepare.outputs.version }}

  check-npm:
    name: Check if Node package exists on npm
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_node == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check npm for existing version
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/node"
          version: ${{ needs.prepare.outputs.version }}

  check-wasm:
    name: Check if WASM package exists on npm
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_wasm == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check npm for existing WASM package
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/wasm"
          version: ${{ needs.prepare.outputs.version }}

  check-rubygems:
    name: Check if Ruby gem exists on RubyGems
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_ruby == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check RubyGems for existing version
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: rubygems
          package: kreuzberg
          version: ${{ needs.prepare.outputs.version }}

  check-maven:
    name: Check if Java package exists on Maven Central
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_java == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check Maven Central for existing version
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: maven
          package: "dev.kreuzberg:kreuzberg"
          version: ${{ needs.prepare.outputs.version }}

  check-nuget:
    name: Check if C# package exists on NuGet
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_csharp == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check NuGet for existing version
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: nuget
          package: Kreuzberg
          version: ${{ needs.prepare.outputs.version }}

  check-packagist:
    name: Check if PHP package exists on Packagist
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_php == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check Packagist for existing version
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: packagist
          package: kreuzberg/kreuzberg
          version: ${{ needs.prepare.outputs.version }}

  check-cli:
    name: Check if CLI assets already published
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_cli == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Check release for existing CLI assets
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          ASSET_PREFIX: kreuzberg-cli-
          REQUIRED_ASSETS: |
            kreuzberg-cli-aarch64-apple-darwin.tar.gz
            kreuzberg-cli-aarch64-unknown-linux-gnu.tar.gz
            kreuzberg-cli-aarch64-unknown-linux-musl.tar.gz
            kreuzberg-cli-x86_64-unknown-linux-gnu.tar.gz
            kreuzberg-cli-x86_64-unknown-linux-musl.tar.gz
            kreuzberg-cli-x86_64-pc-windows-msvc.zip
          SUMMARY_LABEL: CLI
        run: scripts/publish/check-release-assets.sh

  check-go:
    name: Check if Go FFI assets already published
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_go == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Check release for existing Go artifacts
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          ASSET_PREFIX: go-ffi-
          REQUIRED_ASSETS: |
            go-ffi-linux-aarch64.tar.gz
            go-ffi-linux-x86_64.tar.gz
            go-ffi-macos-arm64.tar.gz
            go-ffi-windows-x86_64.tar.gz
          SUMMARY_LABEL: Go FFI
        run: scripts/publish/check-release-assets.sh

  check-c-ffi:
    name: Check if C FFI assets already published
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_c_ffi == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Check release for existing C FFI artifacts
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          ASSET_PREFIX: c-ffi-
          REQUIRED_ASSETS: |
            c-ffi-linux-aarch64.tar.gz
            c-ffi-linux-x86_64.tar.gz
            c-ffi-macos-arm64.tar.gz
            c-ffi-windows-x86_64.tar.gz
          SUMMARY_LABEL: C FFI
        run: scripts/publish/check-release-assets.sh

  check-elixir-release:
    name: Check if Elixir release assets already published
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check release for existing Elixir artifacts
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: github-release
          package: kreuzberg
          version: ${{ needs.prepare.outputs.version }}
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: libkreuzberg_nif-
          repo: kreuzberg-dev/kreuzberg

  check-cratesio:
    name: Check if Rust crate exists on crates.io
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      kreuzberg_exists: ${{ steps.check.outputs.exists }}
      tesseract_exists: ${{ steps.check.outputs.tesseract_exists }}
      paddle_exists: ${{ steps.check.outputs.paddle_exists }}
      cli_exists: ${{ steps.check.outputs.cli_exists }}
      exists: ${{ steps.derive.outputs.all_exist }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check crates.io for existing versions
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: cratesio
          package: kreuzberg
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            tesseract_exists=kreuzberg-tesseract
            paddle_exists=kreuzberg-paddle-ocr
            cli_exists=kreuzberg-cli

      - name: Derive all_exist
        id: derive
        run: |
          if [[ "${{ steps.check.outputs.exists }}" == "true" && \
                "${{ steps.check.outputs.tesseract_exists }}" == "true" && \
                "${{ steps.check.outputs.paddle_exists }}" == "true" && \
                "${{ steps.check.outputs.cli_exists }}" == "true" ]]; then
            echo "all_exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_exist=false" >> "$GITHUB_OUTPUT"
          fi

  check-hex:
    name: Check if Elixir package exists on Hex.pm
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check Hex.pm for existing version
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: hex
          package: kreuzberg
          version: ${{ needs.prepare.outputs.version }}

  check-homebrew:
    name: Check if Homebrew formula already published
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_homebrew == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.result.outputs.exists }}
      formula_exists: ${{ steps.check.outputs.exists }}
      bottles_exist: ${{ steps.check-bottles.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Check Homebrew tap for formula
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: homebrew
          package: kreuzberg
          version: ${{ needs.prepare.outputs.version }}
          tap-repo: kreuzberg-dev/homebrew-tap

      - name: Check if bottles exist in GitHub release
        id: check-bottles
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null | grep -q '\.bottle\.tar\.gz$'; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Bottle assets found in release $TAG"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No bottle assets found in release $TAG"
          fi

      - name: Determine overall homebrew status
        id: result
        env:
          FORMULA_EXISTS: ${{ steps.check.outputs.exists }}
          BOTTLES_EXIST: ${{ steps.check-bottles.outputs.exists }}
        run: |
          if [[ "$FORMULA_EXISTS" == "true" && "$BOTTLES_EXIST" == "true" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Formula and bottles both exist — skipping homebrew pipeline"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Formula exists=$FORMULA_EXISTS, bottles exist=$BOTTLES_EXIST — running homebrew pipeline"
          fi

  python-wheels:
    name: Build Python wheels (${{ matrix.label }})
    needs: [prepare, check-pypi]
    if: ${{ needs.prepare.outputs.release_python == 'true' && needs.check-pypi.outputs.exists != 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            artifact: python-wheels-linux-x86_64
            rust_target: x86_64-unknown-linux-gnu
            manylinux: manylinux_2_28
            python: "3.10"
            needs_qemu: false
            extra_args: ""
          - label: linux-aarch64
            os: ubuntu-24.04-arm
            artifact: python-wheels-linux-aarch64
            rust_target: aarch64-unknown-linux-gnu
            manylinux: manylinux_2_28
            python: "3.10"
            needs_qemu: false
            extra_args: ""
          - label: macos-arm64
            os: macos-latest
            artifact: python-wheels-macos
            needs_qemu: false
            python: "3.10"
            rust_target: aarch64-apple-darwin
            manylinux: ""
            extra_args: ""
          - label: windows-amd64
            os: windows-latest
            artifact: python-wheels-windows
            needs_qemu: false
            python: "3.10"
            rust_target: x86_64-pc-windows-msvc
            manylinux: ""
            extra_args: ""
    steps:
      - name: Maximize build disk space
        if: matrix.os == 'ubuntu-latest'
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 512
          swap-size-mb: 4096
          overprovision-lvm: "true"
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"
          remove-docker-images: "true"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Ensure target commit
        if: ${{ needs.prepare.outputs.target_sha != '' }}
        run: git checkout --progress --force ${{ needs.prepare.outputs.target_sha }}

      - name: Setup QEMU
        if: matrix.os == 'ubuntu-latest' && matrix.needs_qemu
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Free up disk space for wheel build
        if: matrix.os == 'ubuntu-latest'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Prepare wheel staging directory
        shell: bash
        run: mkdir -p target/wheels

      - name: Setup Tesseract cache
        id: tesseract-cache
        uses: ./.github/actions/setup-tesseract-cache
        with:
          label: ${{ matrix.label }}
          enable-cache: "true"
          rust-target: ${{ matrix.rust_target }}

      - name: Setup Rust toolchain (native)
        if: runner.os != 'Linux'
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: python-wheels-${{ matrix.label }}
          target: ${{ matrix.rust_target }}

      - name: Clean previous wheel artifacts
        shell: bash
        run: rm -rf target/wheels target/maturin && find packages/python/kreuzberg -name "_internal_bindings.*" ! -name "*.pyi" -delete

      - name: Build Linux wheels
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -i python${{ matrix.python }} --out ../../target/wheels ${{ matrix.extra_args }}
          target: ${{ matrix.rust_target }}
          manylinux: ${{ matrix.manylinux }}
          working-directory: packages/python
          sccache: false
          docker-options: ${{ steps.tesseract-cache.outputs.docker-options }}
          before-script-linux: |
            set -euo pipefail
            # Prevent GCC 14+ from emitting C23-versioned glibc symbols
            # (__isoc23_strtoll etc.) that require glibc ≥ 2.38.
            # This affects manylinux_2_28 on systems like Debian 12 (glibc 2.36), Ubuntu 22.04.
            # We force the compiler to use the C11/C++17 standard at every FFI boundary
            # by setting flags at the compiler, build system, and environment level.
            #
            # Strategy:
            # 1. Set base CFLAGS/CXXFLAGS for direct compilation
            # 2. Propagate to CMake (respects CMAKE_C_FLAGS, CMAKE_CXX_FLAGS)
            # 3. Set CPPFLAGS for autotools-based deps (e.g. libssl)
            export CFLAGS="-std=gnu11"
            export CXXFLAGS="-std=gnu++17"
            # Propagate C23 suppressions to CMake-based build systems (Tesseract/Leptonica/ORT).
            export CMAKE_C_FLAGS="${CFLAGS}"
            export CMAKE_CXX_FLAGS="${CXXFLAGS}"
            rustup component add rust-src || true
            # Install dependencies based on the container distro
            if command -v yum >/dev/null 2>&1; then
              # CentOS/RHEL (manylinux containers)
              yum install -y openssl openssl-devel pkgconfig
              # The repo .cargo/config.toml pins the linker for aarch64-unknown-linux-gnu
              # to aarch64-linux-gnu-gcc, which is the cross-compiler binary name even on
              # native ARM. Install gcc-c++ so its 'cc' wrapper is on PATH, then symlink.
              if [ "$(uname -m)" = "aarch64" ] && ! command -v aarch64-linux-gnu-gcc >/dev/null 2>&1; then
                ln -sf "$(command -v gcc)" /usr/local/bin/aarch64-linux-gnu-gcc
              fi
              export OPENSSL_LIB_DIR=/usr/lib64
              export OPENSSL_INCLUDE_DIR=/usr/include
            elif command -v apt-get >/dev/null 2>&1; then
              # Debian/Ubuntu
              apt-get update && apt-get install -y pkg-config libssl-dev
              ARCH=$(uname -m)
              if [ "$ARCH" = "aarch64" ]; then
                export OPENSSL_LIB_DIR=/usr/lib/aarch64-linux-gnu
              else
                export OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu
              fi
              export OPENSSL_INCLUDE_DIR=/usr/include
            fi
            # Download ORT shared libraries inside the manylinux container so
            # ort-sys links dynamically against them instead of using its
            # bundled download (which may target a newer glibc).
            echo "=== Downloading ORT shared libraries ==="
            ARCH=$(uname -m)
            ORT_VERSION="${{ env.ORT_VERSION }}"
            if [ "$ARCH" = "aarch64" ]; then
              ORT_ARCHIVE="onnxruntime-linux-aarch64-${ORT_VERSION}.tgz"
            else
              ORT_ARCHIVE="onnxruntime-linux-x64-${ORT_VERSION}.tgz"
            fi
            ORT_URL="https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${ORT_ARCHIVE}"
            curl -fsSL "${ORT_URL}" -o /tmp/ort.tgz
            tar -xzf /tmp/ort.tgz -C /tmp
            ORT_DIR=$(find /tmp -maxdepth 1 -type d -name "onnxruntime-linux-*" | head -n1)
            cp "${ORT_DIR}"/lib/libonnxruntime.so* /usr/lib/ 2>/dev/null || true
            export ORT_LIB_LOCATION="${ORT_DIR}/lib"
            export ORT_PREFER_DYNAMIC_LINK=1

      - name: Build wheels (native)
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release -i python${{ matrix.python }} --out ../../target/wheels ${{ matrix.extra_args }}
          target: ${{ matrix.rust_target }}
          working-directory: packages/python
          sccache: true

      - name: Setup Python (macOS)
        if: matrix.label == 'macos-arm64'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install wheel CLI (macOS)
        if: matrix.label == 'macos-arm64'
        run: python3 -m pip install wheel

      - name: Codesign macOS wheel binaries
        if: matrix.label == 'macos-arm64'
        shell: bash
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: python3 scripts/sign_macos_wheels.py --wheel-dir target/wheels

      - name: List built wheels
        shell: bash
        run: ls -lh target/wheels

      - name: Verify no C23 glibc symbols in Linux wheels
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Checking for C23 glibc symbols in wheel binaries ==="
          failed=0

          for wheel in target/wheels/*.whl; do
            echo "Extracting and checking: $(basename "$wheel")"
            wheel_dir=$(mktemp -d)
            trap 'rm -rf "$wheel_dir" 2>/dev/null || true' EXIT
            unzip -q "$wheel" -d "$wheel_dir"

            # Use process substitution to avoid subshell variable scoping issue
            while IFS= read -r so_file; do
              [[ -z "$so_file" ]] && continue
              echo "  Scanning: $(basename "$so_file")"
              if nm -D "$so_file" 2>/dev/null | grep -qE '__isoc23_'; then
                echo "    ERROR: Found C23 glibc symbol(s) in $so_file:"
                nm -D "$so_file" 2>/dev/null | grep '__isoc23_' || true
                failed=1
              else
                echo "    OK: No C23 glibc symbols found"
              fi
            done < <(find "$wheel_dir" -type f \( -name "*.abi3.so" -o -name "*.so" \) 2>/dev/null || true)

            rm -rf "$wheel_dir" 2>/dev/null || true
            trap - EXIT
          done

          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "FAILED: Wheel contains C23 glibc symbols incompatible with glibc < 2.38"
            echo "This breaks compatibility with Debian 12, Ubuntu 22.04, and other systems with glibc 2.36."
            exit 1
          fi
          echo ""
          echo "SUCCESS: All wheels are free of C23 glibc symbols"

      - name: Setup Python for smoke test
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Smoke test wheel
        shell: bash
        run: scripts/ci/python/smoke-test-wheel.sh

      - name: Clean up Docker resources (Ubuntu)
        if: matrix.os == 'ubuntu-latest' && always()
        run: scripts/publish/ubuntu/docker-prune.sh

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/wheels/*.whl
          retention-days: 14

  python-sdist:
