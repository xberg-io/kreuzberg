            ruby_platform: aarch64-linux
          - os: macos-latest
            label: macos-arm64
            ruby_platform: arm64-darwin
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    env:
      RB_SYS_CARGO_PROFILE: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Ensure target commit
        if: ${{ needs.prepare.outputs.target_sha != '' }}
        run: git checkout --progress --force ${{ needs.prepare.outputs.target_sha }}

      - name: Show initial disk space (Linux)
        if: runner.os == 'Linux'
        run: echo "=== Initial disk space ===" && df -h /

      - name: Free up disk space (Linux)
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup OpenSSL
        uses: kreuzberg-dev/actions/setup-openssl@v1

      - name: Setup Tesseract cache
        id: tesseract-cache
        uses: ./.github/actions/setup-tesseract-cache
        with:
          label: ${{ matrix.label }}
          enable-cache: "true"

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: publish-ruby-${{ matrix.label }}
