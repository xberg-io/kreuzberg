name: Swift

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: actions/setup-swift@v4
        with:
          swift-version: '5.9'
      - name: Build Swift package
        run: swift build --package-path packages/swift
      - name: Run tests
        run: swift test --package-path packages/swift
