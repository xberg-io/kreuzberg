version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      # Pin artifact actions to v4 until GitHub Actions runners support v6/v7
      # v6 and v7 require Actions Runner 2.327.1+ (released Dec 12, 2025)
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/download-artifact"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "cargo"
    # Explicitly list root only — packages/ruby/ext and packages/r/src have
    # standalone workspaces with path deps to vendored crates that only exist
    # at build time. Dependabot cannot resolve these paths.
    directories:
      - "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "kreuzberg"
      - dependency-name: "kreuzberg-ffi"

  - package-ecosystem: "pip"
    directories:
      - "/"
      - "/kreuzberg/packages/python"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/kreuzberg/crates/kreuzberg-node"
      - "/kreuzberg/crates/kreuzberg-wasm"
      - "/kreuzberg/packages/typescript/core"
    schedule:
      interval: "weekly"

  - package-ecosystem: "bundler"
    directory: "/kreuzberg/packages/ruby"
    schedule:
      interval: "weekly"

  - package-ecosystem: "composer"
    directories:
      - "/"
      - "/kreuzberg/packages/php"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/kreuzberg/packages/go/v4"
    schedule:
      interval: "weekly"

  - package-ecosystem: "maven"
    directory: "/kreuzberg/packages/java"
    schedule:
      interval: "weekly"

  - package-ecosystem: "nuget"
    directory: "/kreuzberg/packages/csharp"
    schedule:
      interval: "weekly"

  - package-ecosystem: "mix"
    directory: "/kreuzberg/packages/elixir"
    schedule:
      interval: "weekly"
