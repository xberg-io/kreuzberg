version: "3"
internal: true

tasks:
  update:
    desc: "Update Zig dependencies (zig fetch --update-hash)"
    silent: false
    cmds:
      - cmd: |
          cd packages/zig && zig fetch --update-hash
        ignore_error: false

  upgrade:
    desc: "Upgrade Zig dependencies (zig fetch --save for each .url in build.zig.zon)"
    silent: false
    cmds:
      - cmd: |
          command -v zig >/dev/null 2>&1 || { echo "Zig not found, skipping Zig upgrade"; exit 0; }
          cd packages/zig
          URLs="$(grep "\.url" build.zig.zon 2>/dev/null | cut -d '=' -f 2 | cut -d '#' -f 1 | tr -d '"' | tr -d ' ' || true)"
          if [ -z "$URLs" ]; then
            echo "No external Zig dependencies in build.zig.zon — nothing to upgrade"
            exit 0
          fi
          for URL in $URLs; do
            echo "Updating module $URL"
            zig fetch --save "$URL"
            echo
          done
        ignore_error: false
