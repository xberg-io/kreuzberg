version: "3"
internal: true

tasks:
  update:
    desc: "Update Ruby dependencies within major versions (bundle update --conservative)"
    silent: false
    cmds:
      - cmd: |
          cd packages/ruby && bundle update --conservative
        ignore_error: false

  upgrade:
    desc: "Upgrade Ruby dependencies to latest including breaking changes (bundle update --all)"
    silent: false
    cmds:
      - cmd: |
          command -v bundle >/dev/null 2>&1 || { echo "Bundle not found, skipping Ruby upgrade"; exit 0; }
          cd packages/ruby
          prev_frozen="$(bundle config get frozen 2>/dev/null | awk '/Set for your local app/ {print $NF}')"
          bundle config set --local frozen false
          trap 'if [ -n "$prev_frozen" ] && [ "$prev_frozen" != "false" ]; then bundle config set --local frozen "$prev_frozen"; fi' EXIT
          bundle update --all
          if [ -n "$prev_frozen" ] && [ "$prev_frozen" != "false" ]; then
            bundle config set --local frozen "$prev_frozen"
          fi
        ignore_error: false
