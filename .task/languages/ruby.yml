version: "3"

includes:
  _cfg:
    taskfile: ../config/vars.yml
    internal: true
  _platforms:
    taskfile: ../config/platforms.yml
    internal: true

vars:
  BUNDLE: bundle

tasks:
  install:
    desc: Install Ruby dependencies
    dir: kreuzberg/packages/ruby
    cmds:
      - "{{.BUNDLE}} install"

  setup:
    desc: Alias for install
    dir: kreuzberg/packages/ruby
    cmds:
      - task: ruby:install

  build:
    desc: Build Ruby native extension (uses {{.BUILD_PROFILE}})
    dir: kreuzberg/packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rake compile"

  build:dev:
    desc: Build Ruby native extension in debug mode
    dir: kreuzberg/packages/ruby
    cmds:
      - "{{.BUNDLE}} exec rake compile"

  build:release:
    desc: Build Ruby native extension in release mode (optimized)
    dir: kreuzberg/packages/ruby
    env:
      CFLAGS: "-O3"
      LDFLAGS: "-s"
    cmds:
      - "{{.BUNDLE}} exec rake compile"

  build:ci:
    desc: Build Ruby native extension and gem package in CI mode
    dir: kreuzberg/packages/ruby
    env:
      CFLAGS: "-O3 -g"
    cmds:
      # Clean stale cargo cache from rb_sys tmp directory to prevent fingerprint errors
      - cmd: rm -rf tmp && echo "Cleaned stale tmp directory"
        platforms: [linux, darwin, windows]
      - "{{.BUNDLE}} exec rake compile"
      - "{{.BUNDLE}} exec rake build"

  build:bindings:
    desc: Build Ruby gem for benchmarking
    cmds:
      - bash kreuzberg/scripts/benchmarks/build-ruby-gem.sh

  test:
    desc: Run Ruby tests
    dir: kreuzberg/packages/ruby
    env:
      ORT_DYLIB_PATH: /opt/homebrew/lib/libonnxruntime.dylib
    cmds:
      - "{{.BUNDLE}} exec rspec"

  test:ci:
    desc: Run Ruby tests in CI mode with env setup
    dir: kreuzberg/packages/ruby
    env:
      ORT_DYLIB_PATH: /opt/homebrew/lib/libonnxruntime.dylib
    cmds:
      - "{{.BUNDLE}} exec rspec"

  test:verbose:
    desc: Run Ruby tests with detailed output
    dir: kreuzberg/packages/ruby
    env:
      ORT_DYLIB_PATH: /opt/homebrew/lib/libonnxruntime.dylib
    cmds:
      - "{{.BUNDLE}} exec rspec --format documentation --color"

  lint:
    desc: Lint all Ruby code with auto-fix (rubocop + steep across all directories)
    cmds:
      - cmd: bash kreuzberg/scripts/task/ruby-lint.sh fix
        platforms: [linux, darwin]

  lint:check:
    desc: Check all Ruby code linting without modifications (rubocop + steep)
    cmds:
      - cmd: bash kreuzberg/scripts/task/ruby-lint.sh check
        platforms: [linux, darwin]

  format:
    desc: Format all Ruby code with modifications (rubocop across all directories)
    cmds:
      - cmd: bash kreuzberg/scripts/task/ruby-lint.sh fix
        platforms: [linux, darwin]

  format:check:
    desc: Check all Ruby code formatting without modifications (rubocop)
    cmds:
      - cmd: bash kreuzberg/scripts/task/ruby-lint.sh check
        platforms: [linux, darwin]

  typecheck:
    desc: Run steep type checking
    dir: kreuzberg/packages/ruby
    cmds:
      - "{{.BUNDLE}} exec steep check"

  console:
    desc: Open Ruby console with Kreuzberg loaded
    dir: kreuzberg/packages/ruby
    cmds:
      - "{{.BUNDLE}} exec pry -r ./lib/kreuzberg"

  clean:
    desc: Clean Ruby build artifacts
    dir: kreuzberg/packages/ruby
    cmds:
      - python -c "import shutil, glob, os; shutil.rmtree('tmp', ignore_errors=True); [os.remove(f) for f in glob.glob('ext/kreuzberg/*.o') + glob.glob('ext/kreuzberg/*.so')]"
      - python -c "import shutil, os; [shutil.rmtree(os.path.join(r, d), ignore_errors=True) for r, dirs, _ in os.walk('.') for d in dirs if d == '.steep']"

  update:
    desc: Update Ruby dependencies to latest versions (including major versions)
    dir: kreuzberg/packages/ruby
    cmds:
      - echo "Updating Ruby dependencies to latest versions..."
      - "{{.BUNDLE}} update --all --conservative=false"
      - echo "Checking for remaining outdated dependencies..."
      - "{{.BUNDLE}} outdated || true"

  e2e:generate:
    desc: Generate and auto-fix Ruby E2E tests from fixtures
    cmds:
      - cmd: bash kreuzberg/scripts/task/e2e-generate.sh ruby
        platforms: [linux, darwin]
      - cmd: echo "E2E generation not yet supported on Windows - use WSL or CI"
        platforms: [windows]
      - task: e2e:format

  e2e:test:
    desc: Run Ruby E2E tests
    dir: kreuzberg/e2e/ruby
    cmds:
      - BUNDLE_GEMFILE="../../kreuzberg/packages/ruby/Gemfile" {{.BUNDLE}} exec rspec

  e2e:lint:
    desc: Lint Ruby E2E code (check only)
    dir: kreuzberg/e2e/ruby
    cmds:
      - "{{.BUNDLE}} exec rubocop --config .rubocop.yaml"

  e2e:format:
    desc: Auto-fix Ruby E2E code formatting
    dir: kreuzberg/e2e/ruby
    cmds:
      - "{{.BUNDLE}} exec rubocop --config .rubocop.yaml --autocorrect-all"

  e2e:verify:
    desc: Regenerate and validate Ruby E2E suite (generate + lint + test)
    cmds:
      - task: e2e:generate
      - task: e2e:lint
      - task: e2e:test
