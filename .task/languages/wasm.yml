version: "3"

includes:
  _cfg:
    taskfile: ../config/vars.yml
    internal: true
  _platforms:
    taskfile: ../config/platforms.yml
    internal: true

vars:
  WASM_DIR: "{{.ROOT}}/kreuzberg/crates/kreuzberg-wasm"
  WASI_SDK:
    sh: echo "${WASI_SDK_PATH:-$HOME/wasi-sdk}"
  WASI_CC:
    sh: echo "${WASI_SDK_PATH:-$HOME/wasi-sdk}/bin/clang"
  WASI_AR:
    sh: echo "${WASI_SDK_PATH:-$HOME/wasi-sdk}/bin/ar"

tasks:
  install:
    desc: Install WASM dependencies (pnpm)
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm install

  setup:
    desc: Setup WASM environment (alias for install)
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm install

  build:
    desc: Build WASM bindings for Node.js target (uses {{.BUILD_PROFILE}})
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build

  build:dev:
    desc: Build WASM bindings in debug mode
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build

  build:release:
    desc: Build WASM bindings in release mode (optimized)
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      NODE_ENV: production
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build

  build:ci:
    desc: Build WASM bindings in CI mode
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      NODE_ENV: production
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build:ci

  build:web:
    desc: Build WASM for web browsers
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build:wasm:web

  build:bundler:
    desc: Build WASM for bundlers (webpack, rollup, etc)
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build:wasm:bundler

  build:nodejs:
    desc: Build WASM for Node.js
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build:wasm:nodejs

  build:deno:
    desc: Build WASM for Deno
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build:wasm:deno

  build:all:
    desc: Build WASM for all targets (web, bundler, nodejs, deno)
    dir: kreuzberg/crates/kreuzberg-wasm
    env:
      RUSTFLAGS:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build:all

  build:bindings:
    desc: Build WASM bindings for benchmarking
    env:
      RUSTFLAGS:
    cmds:
      - bash kreuzberg/scripts/benchmarks/build-wasm-bindings.sh

  test:
    desc: Run WASM unit tests with Vitest
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm test

  test:ci:
    desc: Run WASM unit tests in CI mode
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm run build:ci
      - pnpm test

  test:watch:
    desc: Run WASM tests in watch mode
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm test:watch

  test:coverage:
    desc: Run WASM tests with coverage report
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm test:coverage

  test:deno:
    desc: Run Deno WASM E2E tests
    dir: kreuzberg/e2e/wasm-deno
    cmds:
      - deno task test

  test:workers:
    desc: Run Cloudflare Workers WASM E2E tests with Miniflare
    dir: kreuzberg/e2e/wasm-workers
    cmds:
      - pnpm test

  clippy:
    desc: Run clippy on kreuzberg-wasm crate
    env:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - cargo clippy -p kreuzberg-wasm --target wasm32-unknown-unknown -- -D warnings

  lint:
    desc: Lint WASM TypeScript code with auto-fix (biome + oxlint)
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm run lint:fix

  lint:check:
    desc: Check WASM TypeScript linting without modifications
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm run lint

  format:
    desc: Format WASM TypeScript code with modifications (biome)
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm run format

  format:check:
    desc: Check WASM TypeScript formatting without modifications
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm exec biome format typescript --check

  typecheck:
    desc: Type-check WASM TypeScript code
    dir: kreuzberg/crates/kreuzberg-wasm
    cmds:
      - pnpm run typecheck

  clean:
    desc: Clean WASM build artifacts
    cmds:
      - cmd: bash -c "rm -rf kreuzberg/crates/kreuzberg-wasm/dist kreuzberg/crates/kreuzberg-wasm/pkg kreuzberg/crates/kreuzberg-wasm/node_modules kreuzberg/crates/kreuzberg-wasm/.wasm-pack"
        platforms: [linux, darwin]
      - cmd: powershell -Command "Remove-Item -Path @('kreuzberg/crates/kreuzberg-wasm/dist', 'kreuzberg/crates/kreuzberg-wasm/pkg', 'kreuzberg/crates/kreuzberg-wasm/node_modules', 'kreuzberg/crates/kreuzberg-wasm/.wasm-pack') -Recurse -ErrorAction SilentlyContinue; exit 0"
        platforms: [windows]
      - cmd: cd kreuzberg/crates/kreuzberg-wasm && pnpm run clean
        ignore_error: true

  update:
    desc: Update WASM dependencies
    cmds:
      - echo "WASM dependencies updated via node:update (pnpm workspace)"

  e2e:deno:generate:
    desc: Generate and format Deno WASM E2E tests from fixtures
    cmds:
      - cmd: bash kreuzberg/scripts/task/e2e-generate.sh wasm-deno
        platforms: [linux, darwin]
      - cmd: echo "E2E generation not yet supported on Windows - use WSL or CI"
        platforms: [windows]
      - task: e2e:deno:lint

  e2e:deno:lint:
    desc: Lint Deno WASM E2E code
    dir: kreuzberg/e2e/wasm-deno
    cmds:
      - deno lint

  e2e:deno:test:
    desc: Run Deno WASM E2E tests
    dir: kreuzberg/e2e/wasm-deno
    cmds:
      - deno task test

  e2e:deno:verify:
    desc: Build, regenerate, and validate Deno WASM E2E suite
    cmds:
      - task: build:deno
      - task: e2e:deno:generate
      - task: e2e:deno:test

  e2e:workers:generate:
    desc: Generate and format Cloudflare Workers WASM E2E tests from fixtures
    cmds:
      - cmd: bash kreuzberg/scripts/task/e2e-generate.sh wasm-workers
        platforms: [linux, darwin]
      - cmd: echo "E2E generation not yet supported on Windows - use WSL or CI"
        platforms: [windows]
      - task: e2e:workers:lint

  e2e:workers:lint:
    desc: Lint Cloudflare Workers WASM E2E code
    dir: kreuzberg/e2e/wasm-workers
    cmds:
      - pnpm lint

  e2e:workers:test:
    desc: Run Cloudflare Workers WASM E2E tests with Miniflare
    dir: kreuzberg/e2e/wasm-workers
    cmds:
      - pnpm test

  e2e:workers:verify:
    desc: Build, regenerate, and validate Cloudflare Workers WASM E2E suite
    cmds:
      - task: build
      - task: e2e:workers:generate
      - task: e2e:workers:test

  e2e:verify:
    desc: Verify all WASM test suites (Deno + Workers)
    cmds:
      - task: e2e:deno:verify
      - task: e2e:workers:verify
