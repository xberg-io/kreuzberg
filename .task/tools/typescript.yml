version: "3"

includes:
  _cfg:
    taskfile: ../config/vars.yml
    internal: true

vars:
  WASI_CC:
    sh: echo "${WASI_SDK_PATH:-$HOME/wasi-sdk}/bin/clang"
  WASI_AR:
    sh: echo "${WASI_SDK_PATH:-$HOME/wasi-sdk}/bin/ar"

tasks:
  typecheck:
    desc: Run TypeScript type checking across all projects (builds WASM and Node first to resolve module imports)
    cmds:
      - task: _wasm_build
      - task: _node_build
      - pnpm typecheck

  typecheck:check:
    desc: Run TypeScript type checking in check-only mode (ensures builds before typecheck)
    cmds:
      - task: _wasm_build
      - task: _node_build
      - pnpm typecheck

  _wasm_build:
    desc: Build WASM package (internal task)
    dir: crates/kreuzberg-wasm
    env:
      CC_wasm32_unknown_unknown: "{{.WASI_CC}}"
      AR_wasm32_unknown_unknown: "{{.WASI_AR}}"
    cmds:
      - pnpm run build:ci
    internal: true

  _node_build:
    desc: Build Node package (internal task)
    dir: crates/kreuzberg-node
    cmds:
      - pnpm exec napi build --platform --release
      - pnpm exec tsup
    internal: true
