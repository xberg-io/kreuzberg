version: "3"

includes:
  _cfg:
    taskfile: ../config/vars.yml
    internal: true

# Detect platform-specific Pdfium library filename.
vars:
  PDFIUM_LIB_NAME:
    sh: |
      case "$(uname -s)" in
        Darwin*) echo libpdfium.dylib ;;
        Linux*)  echo libpdfium.so ;;
        MINGW*|MSYS*|CYGWIN*) echo pdfium.dll ;;
        *) echo libpdfium.so ;;
      esac

tasks:
  download:
    desc: Download PDFium runtime into target/release and target/debug
    cmds:
      - bash scripts/download_pdfium_runtime.sh

  ensure:
    desc: Ensure libpdfium runtime is staged in target/release (idempotent)
    status:
      - test -f target/release/{{.PDFIUM_LIB_NAME}}
    cmds:
      - bash scripts/download_pdfium_runtime.sh

  install:macos:
    desc: Install system PDFium on macOS
    platforms: [darwin]
    cmds:
      - brew install pdfium-core

  install:linux:
    desc: Install PDFium on Linux (downloads prebuilt)
    platforms: [linux]
    cmds:
      - bash scripts/download_pdfium_runtime.sh
